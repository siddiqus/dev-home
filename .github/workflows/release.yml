name: Release DMG

on:
  push:
    tags:
      - 'v*'

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install
      - run: yarn dist

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
